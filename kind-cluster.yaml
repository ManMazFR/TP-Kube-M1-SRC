kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  disableDefaultCNI: true          # on retire kindnet
  podSubnet: "192.168.0.0/16"      # sous-réseau attendu par Calico
nodes:
  - role: control-plane
    extraPortMappings:
      - { containerPort: 30080, hostPort: 8080, protocol: TCP }   # phpMyAdmin
      - { containerPort: 80,    hostPort: 80,   protocol: TCP }   # Ingress (bonus)
      - { containerPort: 443,   hostPort: 443,  protocol: TCP }   # Ingress (bonus)
  - role: worker
  - role: worker
